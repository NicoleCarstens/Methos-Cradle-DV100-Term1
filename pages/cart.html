<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="template, initial setup, html, css, links, futureUse">
    <meta name="author" content="Nicole Carstens 231151">
    <title>Cart</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Metamorphous&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">


    <link rel="stylesheet" href="../css/main.css">
</head>

<body>
    
<div class="container mt-5">
    <div class="row">
        <!-- Shopping Cart Items -->
        <div class="col-md-8">
            <h3>Your Cart</h3>

            <!-- Cart Item 1 -->
            <div class="cart-item">
                <div class="d-flex">
                    <img src="https://via.placeholder.com/60" alt="Product" class="product-img me-3">
                    <div>
                        <h6>Product Name 1</h6>
                        <p class="mb-0">1 item</p>
                    </div>
                </div>
                <span>$25.99</span>
            </div>

            <!-- Cart Item 2 -->
            <div class="cart-item">
                <div class="d-flex">
                    <img src="https://via.placeholder.com/60" alt="Product" class="product-img me-3">
                    <div>
                        <h6>Product Name 2</h6>
                        <p class="mb-0">2 items</p>
                    </div>
                </div>
                <span>$19.99</span>
            </div>
        </div>

        <!-- Cart Summary -->
        <div class="col-md-4">
            <div class="cart-summary">
                <h5>Summary</h5>
                <ul class="list-unstyled">
                    <li class="d-flex justify-content-between">
                        <span>Subtotal:</span>
                        <span>$45.98</span>
                    </li>
                    <li class="d-flex justify-content-between">
                        <span>Shipping:</span>
                        <span>$5.00</span>
                    </li>
                    <li class="d-flex justify-content-between">
                        <span class="total-price">Total:</span>
                        <span class="total-price">$50.98</span>
                    </li>
                </ul>
                <button class="btn btn-checkout" disabled>Proceed to Checkout</button>
            </div>
        </div>
    </div>
</div>

</body>
